<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Title Template</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header" role="banner">
    <a class="site-brand" href="/">IP Produkter</a>

    <div style="position:relative">
      <div class="header-actions" role="navigation" aria-label="Top Actions">
        <button id="login-btn" type="button" aria-label="Login">Login</button>
        <button id="nav-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="page-nav">Menu</button>
    </div>

      <nav id="page-nav" class="page-nav" role="menu" hidden>
        <ul id="nav-list"></ul>
      </nav>
    </div>
  </header>

  <main id="app">
    <!-- PAGE_CONTENT -->
  </main>
  <script type="module" src="app.js"></script>

  <script>
    // This script handles the nav bar, we might need to change it as I am not quite happy with it right now, currently opening the menu also moves the brand name down.
  (function () {
    const MENU_ITEMS = [
      { title: 'Home', href: '/' }, // We don't have a homepage, and "/" does just also redirect to /products, but I'm keeping this in case we decide to add a homepage at some point.
      { title: 'Products', href: '/products' },
    ];
    const LOGIN_URL = '/login';

    const navList = document.getElementById('nav-list');
    const navEl = document.getElementById('page-nav');
    const toggle = document.getElementById('nav-toggle');
    const loginBtn = document.getElementById('login-btn');

    MENU_ITEMS.filter(i => i.href).forEach(item => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = item.href;
      a.textContent = item.title;
      a.setAttribute('role', 'menuitem');
      li.appendChild(a);
      navList.appendChild(li);
    });

    loginBtn.addEventListener('click', () => {
      window.location.href = LOGIN_URL;
    });

    function closeNav() {
      navEl.hidden = true;
      toggle.setAttribute('aria-expanded', 'false');
    }
    function openNav() {
      navEl.hidden = false;
      toggle.setAttribute('aria-expanded', 'true');
    }

    toggle.addEventListener('click', (e) => {
      const isOpen = toggle.getAttribute('aria-expanded') === 'true';
      (isOpen ? closeNav() : openNav());
      e.stopPropagation();
    });

    document.addEventListener('click', (e) => {
      if (!navEl.contains(e.target) && e.target !== toggle) closeNav();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeNav();
    });
  })();
  </script>
</body>
</html>
