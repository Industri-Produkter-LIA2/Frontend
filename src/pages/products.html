<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Products</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <template id="page-fragment">
    <h1>Products</h1>
    <div class="search-row">
      <label for="product-search">Sök:</label>
      <input id="product-search" type="search" placeholder="Sök efter produkt, kategori eller artikel" />
    </div>
    <div id="products"></div>
  </template>

  <!-- Moved template loading to separate file; templateLoader.js -->
  <script type="module">
    import { loadTemplate } from '/src/templateLoader.js';
    import { initApp } from '/app.js';

    await loadTemplate();
    initApp();
  </script>
</body>
</html>
