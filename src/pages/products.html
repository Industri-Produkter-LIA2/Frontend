<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Products</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <template id="page-fragment">
    <h1>Products</h1>
    <div class="search-row">
      <label for="product-search">Sök:</label>
      <input id="product-search" type="search" placeholder="Sök efter produkt, kategori eller artikel" />
    </div>
    <button id="add-product-btn">Add Product</button>
    <form id="add-product-form" hidden>
      <input id="name" placeholder="Name" />
      <input id="articleNumber" placeholder="Article Number" />
      <input id="price" placeholder="0.00" type="number" step="0.01" />
      <input id="description" placeholder="Description" />
      <input id="imageUrl" placeholder="Image URL" />

      <select id="category"></select>
      <button id="submit-product">Submit</button>
    </form>
    <div id="products"></div>
  </template>

  <!-- Moved template loading to separate file; templateLoader.js -->
  <script type="module">
    import { loadTemplate } from '/src/templateLoader.js';
    import { initApp } from '/app.js';

    await loadTemplate();
    initApp();
  </script>
</body>
</html>
