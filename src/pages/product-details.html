<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Details</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <template id="page-fragment">
    <div id="product-details-container" class="product-details">
        <p>Loading product details...</p>
    </div>
    <button id="update-product">Update Product</button>
    <button id="delete-product">Delete Product</button>
    
    <form id="update-product-form" hidden>
      <input id="name" placeholder="Name" />
      <input id="articleNumber" placeholder="Article Number" />
      <input id="price" type="number" step="0.01" />
      <input id="description" placeholder="Description" />
      <input id="imageUrl" placeholder="Image URL" />

      <select id="category"></select>
      <button id="submit-update">Submit Update</button>
    </form>
  </template>

  <script type="module">
    import { loadTemplate } from '/src/templateLoader.js';
    import { initApp } from '/app.js';

    await loadTemplate();
    initApp();
  </script>
</body>
</html>
