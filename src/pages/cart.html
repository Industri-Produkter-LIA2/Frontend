<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="page-fragment" data-title="Shopping Cart">
        <div class="cart-container" style="max-width: 800px; margin: 2rem auto; padding: 2rem; border: 1px solid #ddd; border-radius: 8px;">
            <h2>Your Shopping Cart 🛒</h2>
            
            <div id="cart-items-container" style="margin-top: 1.5rem;">
                <p>Loading cart...</p>
            </div>
            
            <div style="border-top: 2px solid #333; margin-top: 1.5rem; padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                <a href="/products" style="color: #2196F3; text-decoration: none; font-weight: bold;">← Continue Shopping</a>
                <div id="cart-summary" style="font-size: 1.5rem; font-weight: bold; color: #4CAF50;">
                    <!-- Total will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loadTemplate } from '/src/templateLoader.js'; // Adjust path if needed
        import { initCart } from '/src/scripts/cart.js';
        import { initApp } from '/app.js';
        await loadTemplate();
        initApp();    
        initCart();
    </script>
</body>
</html>
